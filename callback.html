<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>BacktestLab — Authorization</title>
<style>
  :root { color-scheme: dark; }
  body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
    font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:radial-gradient(120% 90% at 50% 0%,#0d1420 0%,#070a0f 70%); color:#e9eff6; }
  .box { max-width:640px; padding:40px 28px; text-align:center; }
  h1 { font-size:30px; margin:0 0 10px; }
  p { color:#c3ccd6; line-height:1.6; }
  code { display:inline-block; margin-top:8px; background:#111a28; border:1px solid rgba(255,255,255,.08);
    padding:10px 14px; border-radius:8px; color:#22d39a; word-break:break-all; font-size:15px; }
  .muted { color:#7d8b9a; font-size:14px; margin-top:24px; }
</style>
</head>
<body>
  <div class="box">
    <h1>Authorization received ✓</h1>
    <p>Copy this code back into BacktestLab to finish connecting your account:</p>
    <p><code id="code">—</code></p>
    <p class="muted">You can close this tab afterwards.</p>
  </div>
  <script>
    const p = new URLSearchParams(location.search);
    document.getElementById('code').textContent =
      p.get('code') || p.get('error_description') || 'No authorization code found in URL.';
  </script>
</body>
</html>
